services:
  - type: web
    name: biogas-telegram-bot
    env: python
    region: oregon
    plan: free
    buildCommand: ./build.sh
    startCommand: ./start.sh
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: biogas-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_FILE
        value: /etc/secrets/credentials.json
      - key: GOOGLE_SHEET_TAB_NAME
        value: Complaints Register
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
    healthCheckPath: /api/health/

databases:
  - name: biogas-db
    databaseName: biogas_bot
    user: biogas_user
    plan: free
