<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Review FCA Upload</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { color-scheme: light; --bg:#f6f7f9; --surface:#fff; --text:#17202a; --muted:#667085; --line:#d0d5dd; --soft:#eef0f3; --action:#0f766e; --danger:#b42318; --ok:#067647; --warn:#92400e; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; font-size:13px; line-height:1.3; }
    main { max-width:1280px; margin:0 auto; padding:6px 6px 56px; }
    header { display:flex; align-items:center; justify-content:space-between; gap:8px; margin:0 0 4px; }
    h1 { margin:0; font-size:18px; line-height:1.15; letter-spacing:0; }
    .meta { margin:2px 0 0; color:var(--muted); font-size:12px; }
    .toolbar { position:sticky; top:0; z-index:5; display:flex; flex-wrap:wrap; gap:5px; align-items:center; padding:5px 0; background:var(--bg); border-bottom:1px solid var(--line); }
    .status { flex:1 1 280px; min-height:32px; display:flex; align-items:center; padding:5px 8px; border:1px solid var(--line); border-radius:5px; background:var(--surface); color:var(--muted); font-size:12px; }
    .status.error { color:var(--danger); border-color:#f3b3ad; background:#fff5f5; }
    .status.ok { color:var(--ok); border-color:#abefc6; background:#ecfdf3; }
    button { min-height:32px; border:1px solid var(--line); border-radius:5px; background:#fff; color:var(--text); padding:5px 8px; font:inherit; font-weight:650; }
    button.primary { background:var(--action); border-color:var(--action); color:#fff; }
    button:disabled { opacity:.55; }
    .summary { display:flex; flex-wrap:wrap; gap:4px; margin:5px 0; }
    .metric { display:flex; align-items:baseline; gap:5px; min-height:28px; border:1px solid var(--line); border-radius:5px; background:var(--surface); padding:4px 7px; }
    .metric strong { font-size:14px; line-height:1; }
    .metric span { color:var(--muted); font-size:11px; white-space:nowrap; }
    .table-wrap { overflow:auto; border:1px solid var(--line); border-radius:5px; background:var(--surface); }
    table { width:100%; border-collapse:collapse; min-width:1220px; }
    th, td { border-bottom:1px solid var(--line); border-right:1px solid var(--soft); padding:3px; vertical-align:top; }
    th { position:sticky; top:43px; z-index:3; background:#f2f4f7; color:#344054; text-align:left; font-size:11px; line-height:1.15; font-weight:700; }
    td:first-child, th:first-child { position:sticky; left:0; z-index:2; background:inherit; }
    th:first-child { z-index:4; background:#f2f4f7; }
    input, select, textarea { width:100%; min-height:28px; border:1px solid var(--line); border-radius:4px; padding:3px 5px; font:inherit; font-size:12px; background:#fff; color:var(--text); }
    input[type="checkbox"] { width:16px; height:16px; min-height:0; margin:5px auto; display:block; }
    textarea { resize:vertical; min-height:28px; }
    .row-review { background:#fffbeb; }
    .row-skipped { background:#f2f4f7; color:#667085; }
    .small { width:42px; min-width:42px; text-align:center; }
    .name { width:176px; }
    .phone { width:118px; }
    .date { width:126px; }
    .status-col { width:185px; }
    .notes { width:210px; }
    .source { width:170px; color:var(--muted); font-size:11px; }
    @media (max-width:520px) { main { padding:4px 4px 52px; } h1 { font-size:16px; } .status { flex-basis:100%; } button { flex:1 1 auto; } th { top:74px; } }
  </style>
</head>
<body>
<main>
  <header>
    <div>
      <h1>Review FCA Upload</h1>
      <p class="meta">Batch {{ batch_id }}</p>
    </div>
  </header>

  <div class="toolbar">
    <div id="status" class="status">Review extracted Section A rows, correct values, then commit approved rows.</div>
    <button type="button" id="approveAll">Approve valid</button>
    <button type="button" id="skipReview">Skip review rows</button>
    <button type="button" class="primary" id="commitBtn">Commit approved rows</button>
  </div>

  <section class="summary" aria-label="FCA upload summary">
    <div class="metric"><strong id="totalCount">0</strong><span>Total rows</span></div>
    <div class="metric"><strong id="approvedCount">0</strong><span>Approved</span></div>
    <div class="metric"><strong id="reviewCount">0</strong><span>Need review</span></div>
    <div class="metric"><strong id="skippedCount">0</strong><span>Skipped</span></div>
  </section>

  <div class="table-wrap">
    <table aria-label="Extracted FCA Section A rows">
      <thead>
        <tr>
          <th class="small">Use</th>
          <th class="name">Customer Name</th>
          <th>ID Number</th>
          <th class="phone">Primary Phone</th>
          <th class="phone">Secondary Phone</th>
          <th>Location</th>
          <th>HB Staff</th>
          <th>Deposit</th>
          <th class="date">Jawabu Visit Date</th>
          <th class="status-col">Status</th>
          <th class="notes">Comment</th>
          <th class="notes">Review Notes</th>
          <th class="source">Source</th>
        </tr>
      </thead>
      <tbody id="rowsBody"></tbody>
    </table>
  </div>
</main>
<script id="batch-data" type="application/json">{{ batch_json|safe }}</script>
<script>
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); tg.enableClosingConfirmation(); }
  const payload = JSON.parse(document.getElementById('batch-data').textContent);
  let rows = payload.rows || [];
  const statusValues = payload.status_values || [];
  const body = document.getElementById('rowsBody');
  const statusEl = document.getElementById('status');
  const fields = ['Customer Name','ID Number','Primary Phone','Secondary Phone','Location','HB Staff','Deposit','Jawabu Visit Date','Status','Comment','Review Notes','Source'];

  function isReview(row) { return row['Import Status'] === 'review_needed' || String(row['Review Notes'] || '').trim(); }
  function editable(name) { return name !== 'Source' && name !== 'Review Notes'; }
  function render() {
    body.innerHTML = '';
    rows.forEach((row) => {
      const tr = document.createElement('tr');
      tr.className = !row.approved ? 'row-skipped' : (isReview(row) ? 'row-review' : '');
      const use = document.createElement('td');
      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox'; checkbox.checked = !!row.approved;
      checkbox.addEventListener('change', () => { row.approved = checkbox.checked; renderCounts(); tr.className = !row.approved ? 'row-skipped' : (isReview(row) ? 'row-review' : ''); });
      use.appendChild(checkbox); tr.appendChild(use);
      fields.forEach(name => {
        const td = document.createElement('td');
        if (name === 'Status') {
          const select = document.createElement('select');
          const blank = document.createElement('option'); blank.value = ''; blank.textContent = '';
          select.appendChild(blank);
          statusValues.forEach(value => { const option = document.createElement('option'); option.value = value; option.textContent = value; select.appendChild(option); });
          select.value = row[name] || '';
          select.addEventListener('change', () => { row[name] = select.value; });
          td.appendChild(select);
        } else if (name === 'Comment') {
          const input = document.createElement('textarea'); input.value = row[name] || '';
          input.addEventListener('input', () => { row[name] = input.value; });
          td.appendChild(input);
        } else {
          const input = document.createElement('input'); input.value = row[name] || ''; input.readOnly = !editable(name);
          input.addEventListener('input', () => { row[name] = input.value; });
          td.appendChild(input);
        }
        tr.appendChild(td);
      });
      body.appendChild(tr);
    });
    renderCounts();
  }
  function renderCounts() {
    document.getElementById('totalCount').textContent = rows.length;
    document.getElementById('approvedCount').textContent = rows.filter(r => r.approved).length;
    document.getElementById('reviewCount').textContent = rows.filter(r => r.approved && isReview(r)).length;
    document.getElementById('skippedCount').textContent = rows.filter(r => !r.approved).length;
  }
  function setStatus(text, kind) { statusEl.textContent = text; statusEl.className = 'status ' + (kind || ''); }
  document.getElementById('approveAll').addEventListener('click', () => { rows.forEach(r => { if (!isReview(r)) r.approved = true; }); render(); });
  document.getElementById('skipReview').addEventListener('click', () => { rows.forEach(r => { if (isReview(r)) r.approved = false; }); render(); });
  document.getElementById('commitBtn').addEventListener('click', async () => {
    const btn = document.getElementById('commitBtn'); btn.disabled = true; setStatus('Committing approved FCA rows...', '');
    try {
      const response = await fetch('/api/fca/review/commit/', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({batch_id: payload.batch_id, token: payload.token, init_data: tg ? tg.initData : '', rows})
      });
      const result = await response.json();
      if (!response.ok || !result.success) {
        if (Array.isArray(result.rows)) { rows = result.rows; render(); }
        setStatus(result.message || 'Some rows still need correction.', 'error');
        return;
      }
      rows = Array.isArray(result.rows) ? result.rows : [];
      render();
      const sync = result.sheet_sync || {};
      setStatus(`Committed ${result.committed || 0} row(s). MD updated: ${sync.updated || 0}, created: ${sync.created || 0}. ${rows.length} row(s) remain.`, 'ok');
      if (!rows.length && tg) setTimeout(() => tg.close(), 900);
    } catch (err) {
      setStatus('Could not commit rows. Check your connection and try again.', 'error');
    } finally { btn.disabled = false; }
  });
  render();
</script>
</body>
</html>
