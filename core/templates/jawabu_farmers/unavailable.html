<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Farmers Review Unavailable</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

    body {
      margin: 0;
      background: #f8fafc;
      color: #0f172a;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    main {
      width: min(100%, 480px);
    }

    section {
      background: #ffffff;
      border: 1px solid rgba(226, 232, 240, 0.8);
      border-radius: 16px;
      padding: 32px 24px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -4px rgba(0, 0, 0, 0.02);
      display: grid;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: -0.02em;
      color: #ef4444;
      text-align: center;
    }

    p {
      margin: 0;
      color: #64748b;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.5;
      border: 1px solid rgba(239, 68, 68, 0.15);
      background: #fef2f2;
      border-radius: 8px;
      padding: 14px;
      color: #b91c1c;
    }
  </style>
  <link rel="stylesheet" href="/static/miniapp/workflow_standard.css?v=15">
</head>
<body class="workflow-standard empty-workflow">
  <main>
    <section>
      <img class="workflow-brand" src="/static/miniapp/jawabu-logo.png" alt="Jawabu">
      <h1>Farmers Review Unavailable</h1>
      <p>{{ message|default:"This Farmers upload review link is missing, invalid, or expired. Send /farmup with the Farmers CSV attached and open the latest review button from Telegram." }}</p>
    </section>
  </main>
</body>
</html>
