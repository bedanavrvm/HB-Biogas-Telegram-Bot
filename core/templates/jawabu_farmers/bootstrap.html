<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Farmers Review</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { margin:0; background:#f6f7f9; color:#17202a; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    main { width:min(100%,520px); margin:0 auto; padding:24px 16px; }
    section { background:#fff; border:1px solid #d0d5dd; border-radius:8px; padding:16px; }
    h1 { margin:0 0 8px; font-size:22px; line-height:1.2; letter-spacing:0; }
    p { margin:0; color:#667085; line-height:1.45; }
    .error { color:#b42318; margin-top:10px; }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>Farmers Review</h1>
      <p id="message">Opening your upload review...</p>
    </section>
  </main>
  <script>
    const tg = window.Telegram && window.Telegram.WebApp;
    if (tg) { tg.ready(); tg.expand(); }
    const params = new URLSearchParams(window.location.search);
    const startParam = params.get('tgWebAppStartParam') || params.get('startapp') || params.get('start_param') || (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) || '';
    if (startParam) {
      window.location.replace('/jawabu-farmers/review/?startapp=' + encodeURIComponent(startParam));
    } else {
      const message = document.getElementById('message');
      message.className = 'error';
      message.textContent = 'No upload batch was provided. In Telegram, send /farmup with the Farmers CSV attached, then open the review button from the bot reply.';
    }
  </script>
</body>
</html>
