<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Farmers Review</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

    body {
      margin: 0;
      background: #f8fafc;
      color: #0f172a;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    main {
      width: min(100%, 460px);
    }

    section {
      background: #ffffff;
      border: 1px solid rgba(226, 232, 240, 0.8);
      border-radius: 16px;
      padding: 32px 24px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -4px rgba(0, 0, 0, 0.02);
      text-align: center;
      display: grid;
      gap: 16px;
      place-items: center;
    }

    h1 {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #0f172a, #0d9488);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      margin: 0;
      color: #64748b;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.5;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3.5px solid #f1f5f9;
      border-top-color: #0d9488;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.2);
      background: #fef2f2;
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      font-weight: 600;
      text-align: left;
    }
  </style>
  <link rel="stylesheet" href="/static/miniapp/workflow_standard.css?v=5">
</head>
<body class="workflow-standard empty-workflow">
  <main>
    <section>
      <img class="workflow-brand" src="/static/miniapp/jawabu-logo.png" alt="Jawabu">
      <div id="loader" class="spinner"></div>
      <h1>Farmers Review</h1>
      <p id="message">Opening your upload review...</p>
    </section>
  </main>
  <script>
    const tg = window.Telegram && window.Telegram.WebApp;
    if (tg) { tg.ready(); tg.expand(); }
    const params = new URLSearchParams(window.location.search);
    const startParam = params.get('tgWebAppStartParam') || params.get('startapp') || params.get('start_param') || (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) || '';
    if (startParam) {
      window.location.replace('/jawabu-farmers/review/?startapp=' + encodeURIComponent(startParam));
    } else {
      const loader = document.getElementById('loader');
      if (loader) loader.style.display = 'none';
      const message = document.getElementById('message');
      message.className = 'error';
      message.textContent = 'No upload batch was provided. In Telegram, send /farmup with the Farmers CSV attached, then open the review button from the bot reply.';
    }
  </script>
</body>
</html>
