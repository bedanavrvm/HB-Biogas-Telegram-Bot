<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Order Approval</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --surface: #ffffff;
      --text: #17202a;
      --muted: #667085;
      --line: #d0d5dd;
      --focus: #2563eb;
      --action: #0f766e;
      --action-pressed: #115e59;
      --danger: #b42318;
      --ok-bg: #ecfdf3;
      --ok-text: #067647;
      --warn-bg: #fffaeb;
      --warn-text: #b54708;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.45;
    }

    main {
      width: min(100%, 880px);
      margin: 0 auto;
      padding: 16px;
      padding-top: 68px;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 4px 0 16px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0;
    }

    .hint {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    form {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }

    fieldset {
      margin: 0;
      padding: 0;
      border: 0;
    }

    legend {
      width: 100%;
      padding: 18px 0 10px;
      font-size: 15px;
      font-weight: 700;
      color: #344054;
      border-top: 1px solid var(--line);
    }

    fieldset:first-of-type legend {
      padding-top: 0;
      border-top: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 5px;
      color: #344054;
      font-size: 13px;
      font-weight: 600;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--text);
      padding: 9px 10px;
      font: inherit;
      letter-spacing: 0;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--focus);
      outline: 3px solid rgba(37, 99, 235, 0.18);
    }

    input[type="file"] {
      padding: 8px;
      background: #fcfcfd;
    }

    .required {
      color: var(--danger);
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .lookup-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .id-suggestions {
      display: none;
      grid-column: 1 / -1;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      overflow: hidden;
    }

    .id-suggestions[data-visible="true"] {
      display: grid;
    }

    .id-suggestion {
      display: grid;
      grid-template-columns: minmax(88px, auto) minmax(0, 1fr);
      gap: 8px 12px;
      align-items: center;
      width: 100%;
      min-height: 48px;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: #ffffff;
      color: var(--text);
      padding: 9px 10px;
      text-align: left;
      cursor: pointer;
    }

    .id-suggestion:last-child {
      border-bottom: 0;
    }

    .id-suggestion:focus,
    .id-suggestion:hover {
      background: #f8fafc;
      outline: 0;
    }

    .id-suggestion-id {
      color: #101828;
      font-size: 14px;
      font-weight: 800;
    }

    .id-suggestion-detail {
      min-width: 0;
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .id-suggestion-empty {
      padding: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .record-meta {
      display: none;
      margin: 0 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      background: #fcfcfd;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .record-meta[data-visible="true"] {
      display: block;
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      background: var(--action);
      color: #ffffff;
      padding: 10px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      border: 1px solid var(--line);
      background: #ffffff;
      color: #344054;
    }

    button.secondary:active {
      background: #f2f4f7;
    }

    button:focus {
      outline: 3px solid rgba(15, 118, 110, 0.22);
      outline-offset: 2px;
    }

    button:active {
      background: var(--action-pressed);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.62;
    }

    .status {
      display: none;
      position: fixed;
      top: 8px;
      left: 12px;
      right: 12px;
      z-index: 20;
      width: min(856px, calc(100% - 24px));
      margin: 0 auto;
      border-radius: 6px;
      padding: 10px 12px;
      box-shadow: 0 8px 20px rgba(16, 24, 40, 0.14);
      font-size: 14px;
      font-weight: 600;
      white-space: pre-line;
    }

    .status[data-state="success"] {
      display: block;
      background: var(--ok-bg);
      color: var(--ok-text);
    }

    .status[data-state="error"] {
      display: block;
      background: #fef3f2;
      color: var(--danger);
    }

    .status[data-state="working"] {
      display: block;
      background: var(--warn-bg);
      color: var(--warn-text);
    }

    .fine-print {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
    }

    .file-summary {
      margin-top: 6px;
      color: #475467;
      font-size: 12px;
      font-weight: 600;
    }

    .file-preview {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .file-card {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      min-height: 64px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      background: #fcfcfd;
    }

    .file-thumb,
    .file-icon {
      width: 56px;
      height: 48px;
      border-radius: 4px;
      object-fit: cover;
      background: #eef2f6;
    }

    .file-icon {
      display: grid;
      place-items: center;
      color: #344054;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .file-name {
      overflow: hidden;
      color: #344054;
      font-size: 13px;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-meta {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }

    .preview-toggle {
      display: none;
      width: max-content;
      min-height: 36px;
      margin-top: 8px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: #344054;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 700;
    }

    .preview-toggle[data-visible="true"] {
      display: inline-flex;
      align-items: center;
    }

    .browser-fallback {
      display: none;
      min-height: 40px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: #344054;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
    }

    .browser-fallback[data-visible="true"] {
      display: inline-flex;
      align-items: center;
    }

    @media (min-width: 720px) {
      main {
        padding: 24px;
        padding-top: 72px;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .file-preview {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .lookup-row {
        grid-template-columns: 1fr auto;
        align-items: end;
      }

      .span-2 {
        grid-column: span 2;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Order Approval</h1>
        <p class="hint">Submit BRO visit details and supporting files.</p>
      </div>
      <button id="browser-fallback" class="browser-fallback" type="button">
        Use phone browser
      </button>
    </header>

    <form id="approval-form" enctype="multipart/form-data" novalidate>
      <p id="status" class="status" role="status" aria-live="polite"></p>

      <input type="hidden" name="group_id" value="{{ group_id }}">
      <input type="hidden" name="init_data" id="init-data">
      <input type="hidden" name="form_token" value="{{ form_token }}">
      <input type="hidden" name="write_blank_fields" id="write-blank-fields" value="0">
      <input type="hidden" name="edit_id_number" id="edit-id-number" value="">
      <input type="hidden" name="edit_sheet" id="edit-sheet" value="">
      <input type="hidden" name="edit_row" id="edit-row" value="">
      <input type="hidden" name="edit_fingerprint" id="edit-fingerprint" value="">
      <p id="record-meta" class="record-meta"></p>

      <fieldset>
        <legend>Customer</legend>
        <div class="grid">
          <div class="lookup-row span-2">
            <label>
              ID number <span class="required">*</span>
              <input id="id-number" name="id_number" inputmode="numeric" autocomplete="off" required>
            </label>
            <button id="lookup-button" class="secondary" type="button">Load existing</button>
            <div id="id-suggestions" class="id-suggestions" role="listbox" aria-label="Matching ID numbers"></div>
          </div>
          <label>
            Date visited
            <input name="date_visited" type="date">
          </label>
          <label class="span-2">
            Customer name
            <input name="customer_name" autocomplete="name">
          </label>
          <label>
            Branch
            <select name="branch">
              <option value=""></option>
              {% for branch in branch_choices %}
                <option value="{{ branch }}">{{ branch }}</option>
              {% endfor %}
            </select>
          </label>
          <label>
            Primary phone
            <input name="primary_phone" inputmode="tel" autocomplete="tel" placeholder="254740614990" pattern="254[0-9]{9}" title="Use 254XXXXXXXXX format, for example 254740614990">
          </label>
          <label>
            Secondary phone
            <input name="secondary_phone" inputmode="tel" placeholder="254712345678" pattern="254[0-9]{9}" title="Use 254XXXXXXXXX format, for example 254712345678">
          </label>
        </div>
      </fieldset>

      <fieldset>
        <legend>Visit</legend>
        <div class="grid">
          <label>
            County
            <input name="county">
          </label>
          <label>
            Sub-county
            <input name="sub_county">
          </label>
          <label>
            Visited by
            <input name="visited_by">
          </label>
          <label>
            HB staff
            <input name="hb_staff">
          </label>
          <label>
            IMAB created
            <select name="imab_created">
              <option value=""></option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
              <option value="Pending">Pending</option>
            </select>
          </label>
          <label class="span-2">
            Landmark
            <textarea name="landmark"></textarea>
          </label>
        </div>
      </fieldset>

      <fieldset>
        <legend>Approval</legend>
        <div class="grid">
          <label>
            HB deposit
            <input name="deposit_hb" inputmode="decimal" pattern="[0-9]+(\\.[0-9]{1,2})?" title="Use a non-negative amount, for example 5000 or 5000.50">
          </label>
          <label>
            JBL deposit
            <input name="deposit_jbl" inputmode="decimal" pattern="[0-9]+(\\.[0-9]{1,2})?" title="Use a non-negative amount, for example 0 or 5000.50">
          </label>
          <label>
            Customer no
            <input name="customer_no" inputmode="numeric" pattern="[0-9]*" title="Use digits only">
          </label>
          <label>
            Credit analysis
            <select name="credit_analysis">
              <option value=""></option>
              <option value="Approved">Approved</option>
              <option value="Pending">Pending</option>
              <option value="Rejected">Rejected</option>
            </select>
          </label>
          <label>
            Final decision
            <select name="final_decision">
              <option value=""></option>
              <option value="Approved">Approved</option>
              <option value="Rejected">Rejected</option>
              <option value="Deferred">Deferred</option>
              <option value="Under Review">Under Review</option>
            </select>
          </label>
          <label class="span-2">
            Comment
            <textarea name="comment"></textarea>
          </label>
        </div>
      </fieldset>

      <fieldset>
        <legend>Files</legend>
        <label>
          ID photos
          <input name="id_photos" type="file" multiple accept="image/*">
          <span class="fine-print" data-upload-help="id_photos">Upload one or more ID images. Maximum {{ max_file_size_mb }} MB per file.</span>
          <span class="file-summary" data-file-summary="id_photos">No files selected.</span>
          <button class="preview-toggle" type="button" data-preview-toggle="id_photos">Show thumbnails</button>
          <span class="file-preview" data-file-preview="id_photos"></span>
        </label>
        <label>
          LAF document
          <input name="laf_documents" type="file" multiple accept="image/*,.pdf,.doc,.docx">
          <span class="fine-print" data-upload-help="laf_documents">Upload one or more LAF pages or documents. Maximum {{ max_file_size_mb }} MB per file.</span>
          <span class="file-summary" data-file-summary="laf_documents">No files selected.</span>
          <button class="preview-toggle" type="button" data-preview-toggle="laf_documents">Show thumbnails</button>
          <span class="file-preview" data-file-preview="laf_documents"></span>
        </label>
        <label>
          Other files
          <input name="other_files" type="file" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx">
          <span class="fine-print" data-upload-help="other_files">Upload any supporting files. Maximum {{ max_file_size_mb }} MB per file.</span>
          <span class="file-summary" data-file-summary="other_files">No files selected.</span>
          <button class="preview-toggle" type="button" data-preview-toggle="other_files">Show thumbnails</button>
          <span class="file-preview" data-file-preview="other_files"></span>
        </label>
      </fieldset>

      <div class="actions">
        <button id="submit-button" type="submit">Submit update</button>
      </div>
    </form>
  </main>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    const form = document.getElementById('approval-form');
    const statusEl = document.getElementById('status');
    const recordMetaEl = document.getElementById('record-meta');
    const browserFallbackButton = document.getElementById('browser-fallback');
    const submitButton = document.getElementById('submit-button');
    const lookupButton = document.getElementById('lookup-button');
    const initDataInput = document.getElementById('init-data');
    const idNumberInput = document.getElementById('id-number');
    const idSuggestionsEl = document.getElementById('id-suggestions');
    const writeBlankFieldsInput = document.getElementById('write-blank-fields');
    const editIdNumberInput = document.getElementById('edit-id-number');
    const editSheetInput = document.getElementById('edit-sheet');
    const editRowInput = document.getElementById('edit-row');
    const editFingerprintInput = document.getElementById('edit-fingerprint');
    const editableFields = [
      'id_number',
      'date_visited',
      'customer_name',
      'branch',
      'primary_phone',
      'secondary_phone',
      'county',
      'sub_county',
      'landmark',
      'visited_by',
      'hb_staff',
      'deposit_hb',
      'deposit_jbl',
      'comment',
      'imab_created',
      'customer_no',
      'credit_analysis',
      'final_decision'
    ];
    const phoneFieldNames = ['primary_phone', 'secondary_phone'];
    const uppercaseFieldNames = ['customer_name', 'branch', 'county', 'sub_county', 'visited_by', 'hb_staff'];
    const moneyFieldNames = ['deposit_hb', 'deposit_jbl'];
    const integerFieldNames = ['customer_no'];
    const fileFieldNames = ['id_photos', 'laf_documents', 'other_files'];
    const maxFileSizeMb = Number('{{ max_file_size_mb|default:20 }}');
    const maxFileSizeBytes = maxFileSizeMb * 1024 * 1024;
    const maxFilesPerSlot = Number('{{ max_files_per_slot|default:10 }}');
    const maxTotalUploadMb = Number('{{ max_total_upload_mb|default:30 }}');
    const maxTotalUploadBytes = maxTotalUploadMb * 1024 * 1024;
    const imagePreviewsEnabled = '{{ image_previews_enabled|yesno:"true,false" }}' === 'true';
    const imagePreviewLimit = Number('{{ image_preview_limit|default:3 }}');
    const phoneSafeUploadMode = (
      window.matchMedia('(pointer: coarse)').matches
      || navigator.maxTouchPoints > 0
      || /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)
    );
    const phoneSafeMaxFilesPerSlot = 2;
    const effectiveMaxFilesPerSlot = phoneSafeUploadMode
      ? Math.min(maxFilesPerSlot, phoneSafeMaxFilesPerSlot)
      : maxFilesPerSlot;
    const previewUrls = new Map();
    const thumbnailsVisible = new Map();
    let suggestionTimer = null;
    let suggestionController = null;

    if (tg) {
      tg.ready();
      tg.expand();
      initDataInput.value = tg.initData || '';
    }
    if (tg && phoneSafeUploadMode && browserFallbackButton) {
      browserFallbackButton.dataset.visible = 'true';
      browserFallbackButton.addEventListener('click', () => {
        tg.openLink(window.location.href);
      });
    }

    function setStatus(state, text) {
      statusEl.dataset.state = state;
      statusEl.textContent = text;
    }

    function validationError(input, message, errors) {
      input.setCustomValidity(message);
      errors.push(message);
    }

    function formatBytes(bytes) {
      const size = Number(bytes || 0);
      if (size >= 1024 * 1024) {
        return `${(size / 1024 / 1024).toFixed(1)} MB`;
      }
      if (size >= 1024) {
        return `${Math.ceil(size / 1024)} KB`;
      }
      return `${size} B`;
    }

    function revokePreviewUrls(fieldName) {
      const urls = previewUrls.get(fieldName) || [];
      for (const url of urls) {
        URL.revokeObjectURL(url);
      }
      previewUrls.set(fieldName, []);
    }

    function fileExtension(file) {
      const name = String(file.name || '');
      const parts = name.split('.');
      return parts.length > 1 ? parts.pop().slice(0, 5) : 'file';
    }

    function fileIconLabel(file) {
      if (file.type && file.type.startsWith('image/')) {
        return 'IMG';
      }
      return fileExtension(file);
    }

    function renderFilePreview(fieldName) {
      const input = form.elements[fieldName];
      const summary = document.querySelector(`[data-file-summary="${fieldName}"]`);
      const preview = document.querySelector(`[data-file-preview="${fieldName}"]`);
      const toggle = document.querySelector(`[data-preview-toggle="${fieldName}"]`);
      if (!input || !summary || !preview) {
        return;
      }

      revokePreviewUrls(fieldName);
      preview.replaceChildren();
      const files = Array.from(input.files || []);
      const totalBytes = files.reduce((sum, file) => sum + file.size, 0);
      const imageCount = files.filter((file) => file.type && file.type.startsWith('image/')).length;
      const showThumbnails = !phoneSafeUploadMode && (
        imagePreviewsEnabled || thumbnailsVisible.get(fieldName) === true
      );
      summary.textContent = files.length
        ? `${files.length} file(s), ${formatBytes(totalBytes)} selected.`
        : 'No files selected.';

      if (toggle) {
        toggle.dataset.visible = (
          !phoneSafeUploadMode && imageCount && !imagePreviewsEnabled
        ) ? 'true' : 'false';
        toggle.textContent = thumbnailsVisible.get(fieldName) ? 'Hide thumbnails' : 'Show thumbnails';
      }

      if (phoneSafeUploadMode) {
        return;
      }

      let imageThumbnailsRendered = 0;
      files.slice(0, 12).forEach((file) => {
        const card = document.createElement('span');
        card.className = 'file-card';

        if (
          file.type
          && file.type.startsWith('image/')
          && showThumbnails
          && imageThumbnailsRendered < imagePreviewLimit
        ) {
          const image = document.createElement('img');
          const url = URL.createObjectURL(file);
          previewUrls.get(fieldName).push(url);
          image.className = 'file-thumb';
          image.src = url;
          image.alt = '';
          card.appendChild(image);
          imageThumbnailsRendered += 1;
        } else {
          const icon = document.createElement('span');
          icon.className = 'file-icon';
          icon.textContent = fileIconLabel(file);
          card.appendChild(icon);
        }

        const detail = document.createElement('span');
        const name = document.createElement('span');
        const meta = document.createElement('span');
        name.className = 'file-name';
        meta.className = 'file-meta';
        name.textContent = file.name || 'Unnamed file';
        meta.textContent = `${formatBytes(file.size)}${file.type ? ` - ${file.type}` : ''}`;
        detail.appendChild(name);
        detail.appendChild(meta);
        card.appendChild(detail);
        preview.appendChild(card);
      });

      if (files.length > 12) {
        const more = document.createElement('span');
        more.className = 'fine-print';
        more.textContent = `+${files.length - 12} more selected.`;
        preview.appendChild(more);
      }
      if (showThumbnails && imageCount > imagePreviewLimit) {
        const limited = document.createElement('span');
        limited.className = 'fine-print';
        limited.textContent = `Showing ${imagePreviewLimit} image thumbnail(s) to protect phone memory.`;
        preview.appendChild(limited);
      }
    }

    function renderAllFilePreviews() {
      for (const name of fileFieldNames) {
        renderFilePreview(name);
      }
    }

    function setRecordMeta(text) {
      recordMetaEl.textContent = text || '';
      recordMetaEl.dataset.visible = text ? 'true' : 'false';
    }

    function setBusy(isBusy) {
      submitButton.disabled = isBusy;
      lookupButton.disabled = isBusy;
    }

    function clearIdSuggestions() {
      if (suggestionTimer) {
        window.clearTimeout(suggestionTimer);
        suggestionTimer = null;
      }
      if (suggestionController) {
        suggestionController.abort();
        suggestionController = null;
      }
      idSuggestionsEl.replaceChildren();
      idSuggestionsEl.dataset.visible = 'false';
    }

    function suggestionLabel(suggestion) {
      const parts = [
        suggestion.order_record_id || '',
        suggestion.customer_name || '',
        suggestion.branch || ''
      ].filter(Boolean);
      return parts.join(' - ');
    }

    function renderIdSuggestions(suggestions, prefix) {
      idSuggestionsEl.replaceChildren();
      const matches = Array.isArray(suggestions) ? suggestions : [];
      if (!String(prefix || '').trim() || String(prefix || '').trim().length < 3) {
        idSuggestionsEl.dataset.visible = 'false';
        return;
      }

      if (!matches.length) {
        const empty = document.createElement('div');
        empty.className = 'id-suggestion-empty';
        empty.textContent = 'No matching IDs found yet.';
        idSuggestionsEl.appendChild(empty);
        idSuggestionsEl.dataset.visible = 'true';
        return;
      }

      matches.forEach((suggestion) => {
        const button = document.createElement('button');
        const idText = document.createElement('span');
        const detailText = document.createElement('span');
        button.type = 'button';
        button.className = 'id-suggestion';
        button.setAttribute('role', 'option');
        idText.className = 'id-suggestion-id';
        detailText.className = 'id-suggestion-detail';
        idText.textContent = suggestion.id_number || '';
        detailText.textContent = suggestionLabel(suggestion) || 'Existing order';
        button.appendChild(idText);
        button.appendChild(detailText);
        button.addEventListener('click', () => {
          idNumberInput.value = suggestion.id_number || '';
          clearIdSuggestions();
          loadExistingRecord();
        });
        idSuggestionsEl.appendChild(button);
      });
      idSuggestionsEl.dataset.visible = 'true';
    }

    function scheduleIdSuggestions() {
      const prefix = idNumberInput.value.trim();
      clearEditContext();
      if (prefix.length < 3) {
        clearIdSuggestions();
        return;
      }
      if (suggestionTimer) {
        window.clearTimeout(suggestionTimer);
      }
      suggestionTimer = window.setTimeout(fetchIdSuggestions, 280);
    }

    async function fetchIdSuggestions() {
      const prefix = idNumberInput.value.trim();
      suggestionTimer = null;
      if (prefix.length < 3) {
        clearIdSuggestions();
        return;
      }
      if (suggestionController) {
        suggestionController.abort();
      }
      suggestionController = new AbortController();

      try {
        const data = new FormData();
        data.set('group_id', form.elements.group_id.value);
        data.set('init_data', initDataInput.value);
        data.set('form_token', form.elements.form_token.value);
        data.set('id_prefix', prefix);

        const response = await fetch('/api/order-approval/webapp/suggest/', {
          method: 'POST',
          body: data,
          signal: suggestionController.signal
        });
        const payload = await response.json();
        if (!response.ok || !payload.success || idNumberInput.value.trim() !== prefix) {
          return;
        }
        renderIdSuggestions(payload.suggestions || [], prefix);
      } catch (error) {
        if (error.name !== 'AbortError') {
          idSuggestionsEl.dataset.visible = 'false';
        }
      } finally {
        suggestionController = null;
      }
    }

    function clearEditContext() {
      writeBlankFieldsInput.value = '0';
      editIdNumberInput.value = '';
      editSheetInput.value = '';
      editRowInput.value = '';
      editFingerprintInput.value = '';
      setRecordMeta('');
    }

    function fillFields(fields) {
      for (const name of editableFields) {
        const input = form.elements[name];
        if (!input || fields[name] === undefined || fields[name] === null) {
          continue;
        }
        setInputValue(input, fields[name]);
      }
    }

    function setInputValue(input, value) {
      if (input.tagName === 'SELECT' && value) {
        const hasOption = Array.from(input.options).some((option) => option.value === value);
        if (!hasOption) {
          const option = new Option(value, value);
          input.add(option);
        }
      }
      input.value = phoneFieldNames.includes(input.name)
        ? normalizeKenyanPhone(value)
        : value;
    }

    function normalizeKenyanPhone(value) {
      const digits = String(value || '').replace(/\D/g, '');
      if (!digits) {
        return '';
      }
      if (digits.length === 10 && digits.startsWith('0')) {
        return `254${digits.slice(1)}`;
      }
      if (digits.length === 9 && (digits.startsWith('7') || digits.startsWith('1'))) {
        return `254${digits}`;
      }
      return digits;
    }

    function normalizePhoneFields() {
      for (const name of phoneFieldNames) {
        const input = form.elements[name];
        if (!input) {
          continue;
        }
        input.value = normalizeKenyanPhone(input.value);
        input.setCustomValidity('');
      }
    }

    function labelText(input) {
      const label = input.closest('label');
      if (!label) {
        return input.name;
      }
      return String(label.childNodes[0].textContent || input.name).trim();
    }

    function validateFormFields() {
      const errors = [];
      for (const name of editableFields) {
        const input = form.elements[name];
        if (input && typeof input.setCustomValidity === 'function') {
          input.setCustomValidity('');
        }
      }

      const idInput = form.elements.id_number;
      if (!String(idInput.value || '').trim()) {
        validationError(idInput, 'ID number is required.', errors);
      }

      for (const name of phoneFieldNames) {
        const input = form.elements[name];
        if (input && input.value && !/^254[0-9]{9}$/.test(input.value)) {
          validationError(input, `${labelText(input)} must use 254XXXXXXXXX format, for example 254740614990.`, errors);
        }
      }

      for (const name of moneyFieldNames) {
        const input = form.elements[name];
        if (input && input.value && !/^[0-9]+(\.[0-9]{1,2})?$/.test(input.value)) {
          validationError(input, `${labelText(input)} must be a non-negative amount with up to 2 decimals.`, errors);
        }
      }

      for (const name of integerFieldNames) {
        const input = form.elements[name];
        if (input && input.value && !/^[0-9]+$/.test(input.value)) {
          validationError(input, 'Customer no must contain digits only.', errors);
        }
      }

      let totalUploadBytes = 0;
      for (const name of fileFieldNames) {
        const input = form.elements[name];
        if (!input) {
          continue;
        }
        input.setCustomValidity('');
        const files = Array.from(input.files || []);
        totalUploadBytes += files.reduce((sum, file) => sum + file.size, 0);
        if (files.length > effectiveMaxFilesPerSlot) {
          validationError(
            input,
            `${labelText(input)} allows up to ${effectiveMaxFilesPerSlot} files on this device.`,
            errors
          );
        }
        for (const file of files) {
          if (file.size > maxFileSizeBytes) {
            validationError(input, `${file.name || labelText(input)} is ${formatBytes(file.size)}. Maximum per file is ${maxFileSizeMb} MB.`, errors);
            break;
          }
        }
      }
      if (totalUploadBytes > maxTotalUploadBytes) {
        const firstFileInput = form.elements[fileFieldNames[0]];
        validationError(
          firstFileInput,
          `Selected files total ${formatBytes(totalUploadBytes)}. Maximum total upload is ${maxTotalUploadMb} MB.`,
          errors
        );
      }

      return errors;
    }

    function normalizeUppercaseFields() {
      for (const name of uppercaseFieldNames) {
        const input = form.elements[name];
        if (!input) {
          continue;
        }
        input.value = String(input.value || '').trim().replace(/\s+/g, ' ').toUpperCase();
      }
    }

    async function loadExistingRecord() {
      if (!idNumberInput.value.trim()) {
        idNumberInput.reportValidity();
        return;
      }

      clearIdSuggestions();
      setBusy(true);
      setStatus('working', 'Loading existing order...');

      try {
        const data = new FormData();
        data.set('group_id', form.elements.group_id.value);
        data.set('init_data', initDataInput.value);
        data.set('form_token', form.elements.form_token.value);
        data.set('id_number', idNumberInput.value.trim());

        const response = await fetch('/api/order-approval/webapp/lookup/', {
          method: 'POST',
          body: data
        });
        const payload = await response.json();

        if (!response.ok || !payload.success) {
          writeBlankFieldsInput.value = '0';
          setRecordMeta('');
          setStatus('error', payload.message || 'Lookup failed.');
          setBusy(false);
          return;
        }

        fillFields(payload.fields || {});
        if (payload.status === 'found') {
          writeBlankFieldsInput.value = '1';
          editIdNumberInput.value = payload.id_number || idNumberInput.value.trim();
          editSheetInput.value = payload.sheet || '';
          editRowInput.value = payload.row || '';
          editFingerprintInput.value = payload.fingerprint || '';
          const recordLabel = payload.order_record_id
            ? `Editing ${payload.order_record_id}.`
            : 'Editing existing entry.';
          setRecordMeta(`${recordLabel} Blank fields will clear existing values.`);
          setStatus('success', payload.message || 'Existing entry loaded.');
        } else {
          clearEditContext();
          setRecordMeta('No existing entry found. Submitting will create a new entry.');
          setStatus('working', payload.message || 'No existing entry found.');
        }
      } catch (error) {
        writeBlankFieldsInput.value = '0';
        setRecordMeta('');
        setStatus('error', 'Network error while loading the order.');
      } finally {
        setBusy(false);
      }
    }

    lookupButton.addEventListener('click', loadExistingRecord);
    idNumberInput.addEventListener('input', scheduleIdSuggestions);
    idNumberInput.addEventListener('focus', scheduleIdSuggestions);
    for (const name of phoneFieldNames) {
      const input = form.elements[name];
      if (input) {
        input.addEventListener('blur', normalizePhoneFields);
        input.addEventListener('input', () => input.setCustomValidity(''));
      }
    }
    for (const name of uppercaseFieldNames) {
      const input = form.elements[name];
      if (input) {
        input.addEventListener('blur', normalizeUppercaseFields);
      }
    }
    for (const name of fileFieldNames) {
      const input = form.elements[name];
      if (input) {
        previewUrls.set(name, []);
        thumbnailsVisible.set(name, false);
        if (phoneSafeUploadMode) {
          const help = document.querySelector(`[data-upload-help="${name}"]`);
          if (help) {
            help.textContent = (
              `Phone-safe upload: select up to ${effectiveMaxFilesPerSlot} files, then submit. `
              + `Add more files by submitting the same customer ID again. `
              + `Maximum ${maxFileSizeMb} MB per file.`
            );
          }
        }
        input.addEventListener('change', () => {
          input.setCustomValidity('');
          thumbnailsVisible.set(name, false);
          renderFilePreview(name);
          if (input.files.length > effectiveMaxFilesPerSlot) {
            const message = (
              `${labelText(input)} allows up to ${effectiveMaxFilesPerSlot} files on this device.`
            );
            input.setCustomValidity(message);
            setStatus('error', message);
            input.reportValidity();
          }
        });
      }
      const toggle = document.querySelector(`[data-preview-toggle="${name}"]`);
      if (toggle) {
        toggle.addEventListener('click', (event) => {
          event.preventDefault();
          thumbnailsVisible.set(name, !thumbnailsVisible.get(name));
          renderFilePreview(name);
        });
      }
    }
    window.addEventListener('pagehide', () => {
      for (const name of fileFieldNames) {
        revokePreviewUrls(name);
      }
    });
    renderAllFilePreviews();

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      normalizePhoneFields();
      normalizeUppercaseFields();
      const validationErrors = validateFormFields();
      if (validationErrors.length) {
        setStatus('error', `Fix these fields:\n- ${validationErrors.join('\n- ')}`);
        form.reportValidity();
        return;
      }
      if (!form.reportValidity()) {
        setStatus('error', 'Fix the highlighted fields before submitting.');
        return;
      }

      setBusy(true);
      setStatus('working', 'Submitting update...');

      try {
        const response = await fetch('/api/order-approval/webapp/submit/', {
          method: 'POST',
          body: new FormData(form)
        });
        const payload = await response.json();

        if (!response.ok || !payload.success) {
          const errors = payload.errors || [];
          const message = errors.length
            ? `Fix these fields:\n- ${errors.join('\n- ')}`
            : (payload.message || 'Submission failed.');
          setStatus('error', message);
          setBusy(false);
          return;
        }

        const changed = (payload.field_changes || [])
          .filter((change) => change.action !== 'confirmed' && change.field !== 'order_record_id')
          .map((change) => `- ${change.header || change.field}: ${change.action || 'updated'}`)
          .join('\n');
        const created = payload.status === 'created';
        const detail = [
          created ? 'ENTRY CREATED' : 'ENTRY UPDATED',
          payload.order_record_id ? `Order record ID: ${payload.order_record_id}` : '',
          `Customer ID: ${payload.id_number || idNumberInput.value.trim()}`,
          payload.customer_name ? `Customer: ${payload.customer_name}` : '',
          `Files stored: ${payload.files_stored || 0}`,
          changed
            ? `${created ? 'Fields saved' : 'Updated fields'}:\n${changed}`
            : 'No field values changed.'
        ].filter(Boolean).join('\n');
        setStatus('success', detail);
        writeBlankFieldsInput.value = payload.status === 'created' ? '0' : writeBlankFieldsInput.value;
        setRecordMeta(
          payload.order_record_id
            ? `${created ? 'Created' : 'Updated'} ${payload.order_record_id}.`
            : `${created ? 'Entry created' : 'Entry updated'}.`
        );
        if (tg) {
          tg.HapticFeedback && tg.HapticFeedback.notificationOccurred('success');
          setTimeout(() => tg.close(), 1200);
        } else {
          setBusy(false);
        }
      } catch (error) {
        setStatus('error', 'Network error. Check your connection and try again.');
        setBusy(false);
      }
    });
  </script>
</body>
</html>
