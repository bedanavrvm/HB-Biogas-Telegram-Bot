name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Check migrations
        env:
          DJANGO_SECRET_KEY: ci-secret-key-for-checks-only-change-in-production
          DEBUG: "True"
          TELEGRAM_WEBHOOK_SECRET: ci-webhook-secret
        run: python manage.py makemigrations --check --dry-run

      - name: Check Django configuration and static assets
        env:
          DJANGO_SECRET_KEY: ci-secret-key-for-checks-only-change-in-production
          DEBUG: "True"
          TELEGRAM_WEBHOOK_SECRET: ci-webhook-secret
        run: |
          python -m compileall config core
          python manage.py check
          python manage.py collectstatic --noinput

      - name: Run Django tests
        env:
          DJANGO_SECRET_KEY: ci-secret-key-for-tests-only-change-in-production
          DEBUG: "True"
          TELEGRAM_WEBHOOK_SECRET: ci-webhook-secret
        run: python manage.py test

      - name: Check Apps Script syntax
        run: |
          for script in *.gs; do
            cp "$script" "/tmp/${script%.gs}.js"
            node --check "/tmp/${script%.gs}.js"
          done

      - name: Scan tracked files for Telegram token patterns
        run: |
          if git grep -nE '[0-9]{8,12}:[A-Za-z0-9_-]{30,}'; then
            echo "Possible Telegram token found in a tracked file. Rotate it and remove it from the repository."
            exit 1
          fi
