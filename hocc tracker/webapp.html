<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --navy: #1b3a6b;
      --gold: #c9a84c;
      --ink: #202631;
      --muted: #667085;
      --line: #d8dee8;
      --soft: #f5f7fb;
      --danger: #b42318;
      --ok: #067647;
      --white: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--soft);
      color: var(--ink);
      font-family: Arial, sans-serif;
      font-size: 15px;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 3;
      background: var(--navy);
      color: var(--white);
      padding: 14px 16px;
      box-shadow: 0 2px 10px rgba(0,0,0,.12);
    }
    h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    header p {
      margin: 4px 0 0;
      color: #dbe6f7;
      font-size: 12px;
    }
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 14px;
    }
    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .stack { display: grid; gap: 10px; }
    .panel {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    button, input, select, textarea, .button-link {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font: inherit;
    }
    button, .button-link {
      background: var(--navy);
      color: var(--white);
      font-weight: 700;
      cursor: pointer;
      padding: 0 12px;
    }
    .button-link {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      text-decoration: none;
    }
    button.secondary, .button-link.secondary {
      background: var(--white);
      color: var(--navy);
    }
    button.gold {
      background: var(--gold);
      color: #1d2433;
      border-color: var(--gold);
    }
    button:disabled {
      cursor: wait;
      opacity: .65;
    }
    input, select, textarea {
      background: var(--white);
      color: var(--ink);
      padding: 10px;
    }
    textarea {
      min-height: 88px;
      resize: vertical;
    }
    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .list {
      display: grid;
      gap: 8px;
    }
    .case-row {
      width: 100%;
      display: grid;
      gap: 3px;
      text-align: left;
      background: var(--white);
      color: var(--ink);
      border: 1px solid var(--line);
      padding: 10px;
      min-height: 66px;
    }
    .case-row strong {
      font-size: 14px;
    }
    .case-row span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .status {
      position: sticky;
      top: 69px;
      z-index: 2;
      min-height: 34px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .status.error { color: var(--danger); border-color: #f6c2bd; background: #fff4f2; }
    .status.ok { color: var(--ok); border-color: #abefc6; background: #f0fdf4; }
    .status.warn { color: #9a6700; border-color: #f2d48b; background: #fff8e6; }
    #detailSummary {
      position: static;
      box-shadow: none;
    }
    .hidden { display: none !important; }
    .alert {
      border: 1px solid #f6c2bd;
      background: #fff4f2;
      color: var(--danger);
      border-radius: 8px;
      padding: 12px;
      line-height: 1.4;
    }
    .alert strong {
      display: block;
      margin-bottom: 5px;
      color: var(--danger);
    }
    .draft-note {
      border: 1px solid #f2d48b;
      background: #fff8e6;
      color: #7a4d00;
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 12px;
      line-height: 1.35;
    }
    .meta-pill {
      display: inline-block;
      width: fit-content;
      margin-top: 2px;
      padding: 3px 7px;
      border-radius: 999px;
      background: #eef4ff;
      color: var(--navy);
      font-size: 11px;
      font-weight: 700;
    }
    .section-title {
      margin: 4px 0 8px;
      color: var(--navy);
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .field {
      display: grid;
      gap: 7px;
      border-top: 1px solid var(--line);
      padding: 10px 0;
    }
    .field:first-child {
      border-top: 0;
      padding-top: 0;
    }
    .field-name {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .readonly {
      color: var(--ink);
      min-height: 24px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .empty {
      color: var(--muted);
      font-style: italic;
    }
    @media (min-width: 720px) {
      main { padding: 18px; }
      .two-col { grid-template-columns: 1fr 1fr; }
      .toolbar { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>
  <header>
    <h1>JBL TAT Mobile</h1>
    <p id="userLine">Loading</p>
  </header>

  <main>
    <p id="status" class="status">Opening tracker...</p>

    <section id="unauthorized" class="panel hidden"></section>

    <section id="app" class="hidden stack">
      <div class="toolbar">
        <button id="homeBtn" class="secondary" type="button">Home</button>
        <button id="newBtn" class="gold" type="button">New Case</button>
        <button id="searchBtn" class="secondary" type="button">Search</button>
        <button id="refreshBtn" class="secondary" type="button">Refresh</button>
      </div>

      <section id="homeView" class="stack">
        <div id="actionsPanel" class="panel hidden">
          <div class="section-title" id="actionsTitle">Action Required</div>
          <div id="actionsList" class="list"></div>
        </div>
        <div class="panel">
          <div class="section-title" id="recentTitle">Recent Cases</div>
          <div id="recentList" class="list"></div>
        </div>
      </section>

      <section id="newView" class="panel hidden">
        <div class="section-title">New Case</div>
        <div class="stack two-col">
          <label>Product<select id="newProduct"></select></label>
          <label>Branch<select id="newBranch"></select></label>
          <label>Client Name<input id="newClient" autocomplete="off"></label>
          <label>BRO Name<input id="newLo" autocomplete="off"></label>
          <label>Amount (KES)<input id="newAmount" type="number" min="50000" step="1" inputmode="numeric" autocomplete="off"> <span id="amountHelp"></span> </label>
          <button id="createCaseBtn" type="button">Create Case</button>
        </div>
      </section>

      <section id="searchView" class="panel hidden">
        <div class="section-title">Search</div>
        <div class="row">
          <input id="query" placeholder="Case ID or client name" autocomplete="off">
          <button id="runSearchBtn" type="button">Go</button>
        </div>
        <div id="searchResults" class="list" style="margin-top:10px"></div>
      </section>

      <section id="detailView" class="panel hidden">
        <div class="section-title" id="detailTitle">Case Detail</div>
        <div id="detailSummary" class="status"></div>
        <div id="draftNotice" class="draft-note hidden"></div>
        <div id="fields" class="stack"></div>
        <button id="saveBtn" type="button">Save Changes</button>
      </section>
    </section>
  </main>

  <script>
    const state = {
      bootstrap: null,
      detail: null,
      busy: false,
      lastHomeRefresh: 0,
    };
    const DRAFT_PREFIX = "jbl-tat-draft:";
    const HOME_REFRESH_MS = 60000;
    const HOME_MIN_REFRESH_MS = 15000;

    const $ = id => document.getElementById(id);

    function callServer(name, ...args) {
      return new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(result => {
            setBusy(false);
            resolve(result);
          })
          .withFailureHandler(error => {
            setBusy(false);
            reject(error);
          })[name](...args);
      });
    }

    // Foreground: locks all buttons while waiting (user-initiated).
    function callServerFg(name, ...args) {
      setBusy(true);
      return callServer(name, ...args);
    }

    // Background: buttons stay active (silent refresh behind the scenes).
    function callServerBg(name, ...args) {
      setBusy("bg");
      return callServer(name, ...args);
    }

    function getSelectedProduct() {
      if (
        !state.bootstrap ||
        !Array.isArray(state.bootstrap.products)
      ) {
        return null;
      }

      const sheetName = $("newProduct").value;

      return state.bootstrap.products.find(
        product => product.sheetName === sheetName
      ) || null;
    }


    function productMaximumAmount(product) {
      if (
        !product ||
        product.maxAmount === null ||
        product.maxAmount === undefined ||
        product.maxAmount === ""
      ) {
        return null;
      }

      const maximumAmount = Number(product.maxAmount);
      return Number.isFinite(maximumAmount) ? maximumAmount : null;
    }

    function updateAmountLimit() {
      const input = $("newAmount");
      const help = $("amountHelp");
      const product = getSelectedProduct();

      const defaultMinimum = Number(
        state.bootstrap && state.bootstrap.minAmount
      );

      const minimumAmount = product &&
        Number.isFinite(Number(product.minAmount))
        ? Number(product.minAmount)
        : defaultMinimum;

      const maximumAmount = productMaximumAmount(product);

      if (Number.isFinite(minimumAmount)) {
        input.min = String(minimumAmount);
      } else {
        input.removeAttribute("min");
      }

      if (Number.isFinite(maximumAmount)) {
        input.max = String(maximumAmount);
      } else {
        input.removeAttribute("max");
      }

      if (
        Number.isFinite(minimumAmount) &&
        Number.isFinite(maximumAmount)
      ) {
        input.placeholder =
          `${minimumAmount.toLocaleString()} - ` +
          `${maximumAmount.toLocaleString()}`;

        help.textContent =
          `Allowed amount: KES ${minimumAmount.toLocaleString()} ` +
          `to KES ${maximumAmount.toLocaleString()}.`;

      } else if (Number.isFinite(minimumAmount)) {
        input.placeholder = `${minimumAmount.toLocaleString()}+`;
        help.textContent =
          `Minimum amount: KES ${minimumAmount.toLocaleString()}.`;

      } else {
        input.placeholder = "Enter amount";
        help.textContent =
          "The amount limit for this product is not configured.";
      }

      input.setCustomValidity("");
    }

    function validateNewCaseAmount() {
      const input = $("newAmount");
      const product = getSelectedProduct();

      if (!product) {
        return {
          valid: false,
          message: "Select a valid product."
        };
      }

      const amount = Number(input.value);
      const minimumAmount = Number(product.minAmount);
      const maximumAmount = productMaximumAmount(product);

      if (!input.value.trim()) {
        return {
          valid: false,
          message: "Enter the loan amount."
        };
      }

      if (!Number.isFinite(amount)) {
        return {
          valid: false,
          message: "Enter a valid loan amount."
        };
      }

      if (!Number.isFinite(minimumAmount)) {
        return {
          valid: false,
          message:
            "The minimum amount is not configured for this product."
        };
      }

      if (amount < minimumAmount) {
        return {
          valid: false,
          message:
            `Amount must be at least KES ` +
            `${minimumAmount.toLocaleString()}.`
        };
      }

      if (
        Number.isFinite(maximumAmount) &&
        amount > maximumAmount
      ) {
        return {
          valid: false,
          message:
            `Amount must be between KES ` +
            `${minimumAmount.toLocaleString()} and KES ` +
            `${maximumAmount.toLocaleString()}.`
        };
      }

      return {
        valid: true,
        amount
      };
    }



    // busy = true  → full UI lock (user-initiated calls)
    // busy = "bg"  → silent background call; buttons stay enabled
    function setBusy(busy) {
      state.busy = busy;
      const locked = busy === true;
      document.querySelectorAll("button").forEach(btn => btn.disabled = locked);
    }

    function setStatus(message, tone) {
      const el = $("status");
      el.textContent = message || "";
      el.className = "status" + (tone ? " " + tone : "");
    }

    function friendlyError(error) {
      const message = error && error.message ? error.message : String(error || "");
      if (message.includes("No Google account email")) {
        return "Google did not provide your account email. Open the deployed web app URL while signed into the Gmail registered in STAFF, and confirm the deployment is set to run as the user accessing the app.";
      }
      if (message.includes("Authorization is required") || message.includes("ScriptError")) {
        return "Google authorization is required. Refresh this page and approve the requested access for your registered Gmail account.";
      }
      if (message.includes("Access is not configured")) {
        return "This Gmail is not active in STAFF. Ask IT to add or activate the exact account shown on this phone.";
      }
      return message || "Something went wrong.";
    }

    function showUnauthorized(data) {
      $("userLine").textContent = "Access denied";
      const box = $("unauthorized");
      box.className = "alert";
      const detectedEmail = data.email ? `<div style="margin-top:10px"><strong>Detected Gmail:</strong> ${escapeHtml(data.email)}</div>` : "";
      box.innerHTML =
        `<strong>Access not configured</strong>` +
        `<div>${escapeHtml(data.reason || "Use the Gmail registered by IT for the mobile tracker.")}</div>` +
        detectedEmail +
        `<div style="margin-top:10px">Apps Script uses the Google account selected by the browser. To use another Gmail, open this URL in the browser profile, Chrome account, or private window where that Gmail is active.</div>`;
      setStatus("Unauthorized", "error");
    }

    function safeStorageGet(key) {
      try { return window.localStorage.getItem(key); } catch (e) { return null; }
    }
    function safeStorageSet(key, value) {
      try { window.localStorage.setItem(key, value); } catch (e) { setStatus("Draft backup is unavailable in this browser.", "warn"); }
    }
    function safeStorageRemove(key) {
      try { window.localStorage.removeItem(key); } catch (e) {}
    }

    function detailDraftKey(summary) {
      return `${DRAFT_PREFIX}${summary.sheetName}:${summary.caseId}`;
    }
    function readDraft(summary) {
      const raw = safeStorageGet(detailDraftKey(summary));
      if (!raw) return null;
      try { const d = JSON.parse(raw); return d && d.values ? d : null; } catch (e) { safeStorageRemove(detailDraftKey(summary)); return null; }
    }
    function writeDraft() {
      if (!state.detail) return;
      const values = {};
      $("fields").querySelectorAll("input[data-col], select[data-col], textarea[data-col]").forEach(input => {
        if ((input.value || "") !== (input.dataset.original || "")) values[input.dataset.col] = input.value;
      });
      const key = detailDraftKey(state.detail.summary);
      if (Object.keys(values).length) {
        safeStorageSet(key, JSON.stringify({ savedAt: new Date().toISOString(), values }));
      } else {
        safeStorageRemove(key);
      }
    }
    function clearDraft(summary) {
      safeStorageRemove(detailDraftKey(summary));
      $("draftNotice").classList.add("hidden");
      $("draftNotice").textContent = "";
    }
    function newCaseDraftKey() {
      const email = state.bootstrap && state.bootstrap.user ? state.bootstrap.user.email : "unknown";
      return `${DRAFT_PREFIX}new-case:${email}`;
    }
    function readNewCaseDraft() {
      const raw = safeStorageGet(newCaseDraftKey());
      if (!raw) return null;
      try { return JSON.parse(raw); } catch (e) { safeStorageRemove(newCaseDraftKey()); return null; }
    }
    function writeNewCaseDraft() {
      const draft = {
        sheetName: $("newProduct").value,
        branch: $("newBranch").value,
        clientName: $("newClient").value,
        loName: $("newLo").value,
        amount: $("newAmount").value,
      };
      if (draft.clientName || draft.amount || draft.loName) {
        safeStorageSet(newCaseDraftKey(), JSON.stringify(draft));
      } else {
        safeStorageRemove(newCaseDraftKey());
      }
    }
    function restoreNewCaseDraft() {
      const draft = readNewCaseDraft();
      if (!draft) return;
      if (draft.sheetName) $("newProduct").value = draft.sheetName;
      if (draft.branch) $("newBranch").value = draft.branch;
      $("newClient").value = draft.clientName || "";
      $("newLo").value = draft.loName || $("newLo").value;
      $("newAmount").value = draft.amount || "";
    }
    function clearNewCaseDraft() { safeStorageRemove(newCaseDraftKey()); }

    function show(viewId) {
      ["homeView", "newView", "searchView", "detailView"].forEach(id => $(id).classList.add("hidden"));
      $(viewId).classList.remove("hidden");
    }

    function renderCaseButton(item) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "case-row";
      const nextStage = item.nextStage ? `<span class="meta-pill">${escapeHtml(item.nextStage)}</span>` : "";
      const reason = item.queueReason ? `<span>${escapeHtml(item.queueReason)}</span>` : "";
      btn.innerHTML =
        `<strong>${escapeHtml(item.caseId || "")} - ${escapeHtml(item.client || "")}</strong>` +
        `<span>${escapeHtml(item.product || "")} | ${escapeHtml(item.branch || "")} | ${escapeHtml(item.status || "")}</span>` +
        reason + nextStage;
      btn.addEventListener("click", () => openCase(item));
      return btn;
    }

    function renderList(id, items, emptyText) {
      const list = $(id);
      list.innerHTML = "";
      if (!items || !items.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = emptyText;
        list.appendChild(empty);
        return;
      }
      items.forEach(item => list.appendChild(renderCaseButton(item)));
    }

    function renderBootstrap(data) {
      state.bootstrap = data;
      if (!data.authorized) { showUnauthorized(data); return; }
      $("unauthorized").classList.add("hidden");
      $("app").classList.remove("hidden");
      $("userLine").textContent = `${data.user.name} | ${data.user.role}`;
      setStatus("Ready", "ok");
      fillSelect($("newProduct"), data.products, "sheetName", "label");
      fillSelect($("newBranch"), data.branches.map(b => ({ value: b, label: b })), "value", "label");
      $("newLo").value = data.user.name || "";
      restoreNewCaseDraft();
      updateAmountLimit();
      renderHomeLists(data);
      show("homeView");
    }

    function renderHomeLists(data) {
      renderList("recentList", data.recent, "No recent cases found.");
      renderList("actionsList", data.actionRequired, "No cases in your queue.");
      $("actionsTitle").textContent = `My Queue (${(data.actionRequired || []).length})`;
      $("recentTitle").textContent = `Recent Cases (${(data.recent || []).length})`;
      $("actionsPanel").classList.toggle("hidden", !data.actionRequired || !data.actionRequired.length);
      state.lastHomeRefresh = Date.now();
      if (state.bootstrap) {
        state.bootstrap.recent = data.recent || [];
        state.bootstrap.actionRequired = data.actionRequired || [];
      }
    }

    async function refreshHomeData(options = {}) {
      if (!state.bootstrap || !state.bootstrap.authorized || state.busy === true) return;
      if (options.silent && Date.now() - state.lastHomeRefresh < HOME_MIN_REFRESH_MS) return;
      try {
        if (!options.silent) setStatus("Refreshing queue...");
        const data = await callServerFg("webGetHomeData");
        renderHomeLists(data);
        if (!options.silent) setStatus("Queue updated", "ok");
      } catch (error) {
        if (!options.silent) setStatus(friendlyError(error), "error");
      }
    }

    function homeVisible() { return !$("homeView").classList.contains("hidden"); }

    function fillSelect(select, items, valueKey, labelKey) {
      select.innerHTML = "";
      items.forEach(item => {
        const opt = document.createElement("option");
        opt.value = item[valueKey];
        opt.textContent = item[labelKey];
        select.appendChild(opt);
      });
    }

    async function openCase(item) {
      try {
        setStatus("Opening case...");
        const detail = await callServerFg("webGetCaseDetail", {
          sheetName: item.sheetName,
          row: item.row,
          caseId: item.caseId,
        });
        renderDetail(detail);
      } catch (error) {
        setStatus(friendlyError(error), "error");
      }
    }

    async function reloadCurrentCaseAfterError() {
      if (!state.detail || !state.detail.summary) return false;
      try {
        const summary = state.detail.summary;
        const detail = await callServerFg("webGetCaseDetail", {
          sheetName: summary.sheetName,
          row: summary.row,
          caseId: summary.caseId,
        });
        renderDetail(detail);
        return true;
      } catch (e) { return false; }
    }

    function renderDetail(detail) {
      state.detail = detail;
      const summary = detail.summary;
      const draft = readDraft(summary);
      $("detailTitle").textContent = `${summary.caseId} - ${summary.client}`;
      $("detailSummary").textContent = `${summary.product} | ${summary.branch} | ${summary.status} | KES ${summary.amount || ""}`;
      $("draftNotice").classList.add("hidden");
      $("draftNotice").textContent = "";

      const fields = $("fields");
      fields.innerHTML = "";
      // Use a DocumentFragment: batch all DOM writes into one layout pass.
      const fragment = document.createDocumentFragment();
      detail.fields.forEach(field => {
        const row = document.createElement("div");
        row.className = "field";
        const label = document.createElement("div");
        label.className = "field-name";
        label.textContent = field.label;
        row.appendChild(label);

        if (!field.editable) {
          const value = document.createElement("div");
          value.className = field.value ? "readonly" : "readonly empty";
          value.textContent = field.value || "Not set";
          row.appendChild(value);
          if (field.lockedReason) {
            const reason = document.createElement("div");
            reason.className = "empty";
            reason.textContent = field.lockedReason;
            row.appendChild(reason);
          }
        } else if (field.kind === "timestamp") {
          const value = document.createElement("div");
          value.className = field.value ? "readonly" : "readonly empty";
          value.textContent = field.value || "Not yet stamped";
          row.appendChild(value);
          if (!field.value) {
            const button = document.createElement("button");
            button.type = "button";
            button.textContent = "Stamp Now";
            button.addEventListener("click", () => submitChanges([{ col: field.col, value: "STAMP" }]));
            row.appendChild(button);
          }
        } else if (field.kind === "dropdown") {
          const select = document.createElement("select");
          select.dataset.col = field.col;
          select.dataset.original = field.value || "";
          select.innerHTML = `<option value=""></option>` + field.options.map(opt =>
            `<option value="${escapeHtml(opt)}"${opt === field.value ? " selected" : ""}>${escapeHtml(opt)}</option>`
          ).join("");
          if (draft && draft.values[String(field.col)] !== undefined) select.value = draft.values[String(field.col)];
          select.addEventListener("input", writeDraft);
          select.addEventListener("change", () => {
            writeDraft();
            if ((select.value || "") !== (select.dataset.original || "")) {
              submitChanges([{ col: Number(select.dataset.col), value: select.value }]);
            }
          });
          row.appendChild(select);
        } else {
          const input = field.kind === "text" && field.label.toLowerCase().includes("remarks")
            ? document.createElement("textarea")
            : document.createElement("input");
          input.dataset.col = field.col;
          input.dataset.original = field.value || "";
          input.value = field.value || "";
          if (field.kind === "number") input.type = "number";
          if (draft && draft.values[String(field.col)] !== undefined) input.value = draft.values[String(field.col)];
          input.addEventListener("input", writeDraft);
          input.addEventListener("change", writeDraft);
          row.appendChild(input);
        }
        fragment.appendChild(row);
      });
      fields.appendChild(fragment);  // single layout pass
      if (draft) {
        $("draftNotice").textContent = "Unsaved draft restored from this browser.";
        $("draftNotice").classList.remove("hidden");
      }
      show("detailView");
    }

    function collectChanges() {
      const changes = [];
      $("fields").querySelectorAll("input[data-col], select[data-col], textarea[data-col]").forEach(input => {
        if ((input.value || "") !== (input.dataset.original || "")) {
          changes.push({ col: Number(input.dataset.col), value: input.value });
        }
      });
      return changes;
    }

    async function submitChanges(changes) {
      try {
        if (!changes.length) { setStatus("No changes to save."); return; }
        setStatus("Saving...");
        const detail = await callServerFg("webSubmitCaseUpdate", {
          sheetName: state.detail.summary.sheetName,
          row: state.detail.summary.row,
          caseId: state.detail.summary.caseId,
          changes,
        });
        renderDetail(detail);
        clearDraft(detail.summary);
        setStatus("Saved", "ok");  // show immediately — don't block on home refresh
        // Refresh home list quietly without locking the UI.
        callServerBg("webGetHomeData").then(data => renderHomeLists(data)).catch(() => {});
      } catch (error) {
        const refreshed = await reloadCurrentCaseAfterError();
        setStatus(refreshed ? `${friendlyError(error)} Case refreshed.` : friendlyError(error), "error");
      }
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;",
      }[char]));
    }

    $("homeBtn").addEventListener("click", async () => {
      show("homeView");
      await refreshHomeData();
    });
    $("newBtn").addEventListener("click", () => show("newView"));
    $("searchBtn").addEventListener("click", () => show("searchView"));
    $("refreshBtn").addEventListener("click", () => init());
    $("saveBtn").addEventListener("click", () => submitChanges(collectChanges()));

    ["newBranch", "newClient", "newLo", "newAmount"].forEach(id => {
      $(id).addEventListener("input", writeNewCaseDraft);
      $(id).addEventListener("change", writeNewCaseDraft);
    });

    $("newProduct").addEventListener("change", () => { updateAmountLimit(); writeNewCaseDraft(); });

    $("newAmount").addEventListener("input", () => {
      const validation = validateNewCaseAmount();
      $("newAmount").setCustomValidity(validation.valid ? "" : validation.message);
    });

    $("runSearchBtn").addEventListener("click", async () => {
      try {
        setStatus("Searching...");
        const results = await callServerFg("webSearchCases", $("query").value);
        renderList("searchResults", results, "No matching cases.");
        setStatus("Search complete", "ok");
      } catch (error) {
        setStatus(friendlyError(error), "error");
      }
    });

    $("createCaseBtn").addEventListener("click", async () => {
      try {
        const clientName = $("newClient").value.trim();
        const branch = $("newBranch").value;
        const loName = $("newLo").value.trim();
        const sheetName = $("newProduct").value;

        if (!clientName) { setStatus("Client name is required.", "error"); $("newClient").focus(); return; }
        if (!branch) { setStatus("Select a valid branch.", "error"); $("newBranch").focus(); return; }
        if (!loName) { setStatus("BRO name is required.", "error"); $("newLo").focus(); return; }

        const amountValidation = validateNewCaseAmount();
        if (!amountValidation.valid) {
          $("newAmount").setCustomValidity(amountValidation.message);
          $("newAmount").reportValidity();
          setStatus(amountValidation.message, "error");
          $("newAmount").focus();
          return;
        }
        $("newAmount").setCustomValidity("");
        setStatus("Creating case...");

        const detail = await callServerFg("webCreateCase", {
          sheetName, branch, clientName, loName, amount: amountValidation.amount
        });

        $("newClient").value = "";
        $("newAmount").value = "";
        clearNewCaseDraft();
        renderDetail(detail);
        setStatus("Case created", "ok");  // show immediately
        // Refresh home list quietly without locking the UI.
        callServerBg("webGetHomeData").then(data => renderHomeLists(data)).catch(() => {});

      } catch (error) {
        setStatus(friendlyError(error), "error");
      }
    });

    async function init() {
      try {
        setStatus("Opening tracker...");
        renderBootstrap(await callServerFg("webGetBootstrap"));
      } catch (error) {
        setStatus(friendlyError(error), "error");
      }
    }

    window.addEventListener("beforeunload", () => {
      writeDraft();
      if (state.bootstrap && state.bootstrap.authorized) writeNewCaseDraft();
    });
    window.addEventListener("focus", () => { if (homeVisible()) refreshHomeData({ silent: true }); });
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden && homeVisible()) refreshHomeData({ silent: true });
    });
    window.setInterval(() => {
      if (!document.hidden && homeVisible() && Date.now() - state.lastHomeRefresh >= HOME_REFRESH_MS) {
        refreshHomeData({ silent: true });
      }
    }, HOME_REFRESH_MS);

    init();

  </script>
</body>
</html>
